name: Build and Release Linux AppImage

on:
  workflow_dispatch: # Solo se ejecutará cuando lo actives manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build AppImage
        run: npm run build:ci

      # Extrae la versión de forma segura sin problemas de comillas
      - name: Get version from package.json
        id: pkg_version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$PKG_VERSION" >> $GITHUB_OUTPUT

      # Crea el Release en GitHub y sube el AppImage
      - name: Create Release and Upload AppImage
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.pkg_version.outputs.VERSION }}
          name: Release v${{ steps.pkg_version.outputs.VERSION }}
          body: "AI Hub Desktop New Version Release."
          files: dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
