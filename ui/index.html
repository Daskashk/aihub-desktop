<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>AI Hub Desktop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Compact Header -->
        <header class="app-header">
            <button id="btn-toggle-sidebar" class="btn btn-icon" title="Toggle Sidebar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1>AI Hub</h1>
            <div class="header-controls">
                <button id="btn-zoom-out" class="btn btn-icon" title="Zoom Out">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button id="btn-zoom-in" class="btn btn-icon" title="Zoom In">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button id="btn-update" class="btn btn-icon" title="Update Services List">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
                </button>
                <button id="btn-settings" class="btn btn-icon" title="Settings">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar: Now acts as Tabs -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <h3>Services</h3>
                </div>
                <div id="services-list" class="services-list">
                    <!-- Active services populated here -->
                </div>
            </aside>

            <!-- Webview Area -->
            <div class="content-wrapper">
                <div id="welcome-screen" class="welcome-screen">
                    <h2>Welcome to AI Hub</h2>
                    <p>Select a service from the sidebar to begin.</p>
                </div>
                <div id="webviews-container"></div>
            </div>
        </main>

        <!-- Settings Modal -->
        <div id="settings-panel" class="settings-modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="btn-close-settings" class="btn btn-icon">✕</button>
                </div>
                <div class="modal-tabs">
                    <button class="modal-tab active" data-tab="general">General</button>
                    <button class="modal-tab" data-tab="services">Manage Services</button>
                </div>
                <div class="modal-body">
                    <!-- General Tab -->
                    <div id="tab-general" class="tab-content active">
                        <div class="setting-group">
                            <label class="setting-label"><input type="checkbox" id="toggle-blocking" checked><span>Enable Domain Blocking</span></label>
                            <small class="setting-hint">Blocks connections to non-whitelisted domains.</small>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label" for="max-services">Active Services Limit</label>
                            <input type="number" id="max-services" min="1" max="10" value="3" class="input-field">
                            <small class="setting-hint">Limits RAM usage by restricting concurrent services.</small>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label"><input type="checkbox" id="toggle-dark-mode" checked><span>Dark Mode</span></label>
                        </div>
                        <div class="setting-group">
                            <div class="info-box"><p><strong>Last Updated:</strong> <span id="last-update">Never</span></p></div>
                        </div>
                        <div class="setting-actions">
                            <button id="btn-save-settings" class="btn btn-primary">Save Changes</button>
                        </div>
                    </div>
                    <!-- Services Tab -->
                    <div id="tab-services" class="tab-content">
                        <div id="all-services-list" class="services-manager"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <footer class="status-bar">
            <div id="status-message" class="status-message">Ready</div>
            <div class="blocking-status">
                <span id="blocking-indicator" class="indicator active"></span>
                <span id="blocking-text">Blocking Active</span>
            </div>
        </footer>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
