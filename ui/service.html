<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicio</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    webview {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <webview id="serviceWebview" src="about:blank" allowpopups></webview>

  <script>
    const { ipcRenderer } = require('electron');

    // Obtener parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const serviceUrl = urlParams.get('url');
    const serviceName = urlParams.get('name');
    const serviceId = urlParams.get('id');

    // Cargar el servicio
    const webview = document.getElementById('serviceWebview');

    if (serviceUrl) {
      webview.src = serviceUrl;
    }

    // Manejar eventos del webview
    webview.addEventListener('did-start-loading', () => {
      console.log('Cargando servicio...');
    });

    webview.addEventListener('did-finish-load', () => {
      console.log('Servicio cargado');
    });

    webview.addEventListener('did-fail-load', (event) => {
      console.error('Error cargando servicio:', event.errorDescription);
    });

    // Manejar nuevas ventanas (popups)
    webview.addEventListener('new-window', (event) => {
      // Abrir enlaces externos en el navegador por defecto
      require('electron').shell.openExternal(event.url);
    });
  </script>
</body>
</html>
