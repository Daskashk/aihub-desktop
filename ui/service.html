<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    webview {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <webview id="serviceWebview" src="about:blank" allowpopups></webview>

  <script>
    const { ipcRenderer } = require('electron');

    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const serviceUrl = urlParams.get('url');
    const serviceName = urlParams.get('name');
    const serviceId = urlParams.get('id');

    // Load the service
    const webview = document.getElementById('serviceWebview');

    if (serviceUrl) {
      webview.src = serviceUrl;
    }

    // Handle webview events
    webview.addEventListener('did-start-loading', () => {
      console.log('Loading service...');
    });

    webview.addEventListener('did-finish-load', () => {
      console.log('Service loaded');
    });

    webview.addEventListener('did-fail-load', (event) => {
      console.error('Error loading service:', event.errorDescription);
    });

    // Handle new windows (popups)
    webview.addEventListener('new-window', (event) => {
      // Open external links in default browser
      require('electron').shell.openExternal(event.url);
    });
  </script>
</body>
</html>
